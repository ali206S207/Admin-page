<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEFA GYM</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f5f5f5;--white:#ffffff;--black:#0a0a0a;
  --gray:#6b6b6b;--gray-light:#e8e8e8;--gray-lighter:#f0f0f0;--border:#e0e0e0;
  --success:#16a34a;--warning:#d97706;--danger:#dc2626;
  --radius:14px;--radius-sm:8px;
}
html{font-size:16px;}
body{font-family:"Cairo",sans-serif;background:var(--bg);color:var(--black);min-height:100vh;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--border);padding:0 1.25rem;height:58px;display:flex;align-items:center;justify-content:space-between;}
.topbar img{height:38px;object-fit:contain;}
.topbar-right{display:flex;align-items:center;gap:0.6rem;}
.btn-icon{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;transition:background 0.15s;}
.btn-icon:hover{background:var(--gray-lighter);}
.btn-add-top{height:38px;padding:0 1.1rem;background:var(--black);color:var(--white);border:none;border-radius:20px;font-family:"Cairo",sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:0.35rem;transition:opacity 0.15s;}
.btn-add-top:hover{opacity:0.82;}

/* MAIN */
.main{max-width:680px;margin:0 auto;padding:1.25rem 1rem 5rem;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0.6rem;margin-bottom:1.25rem;}
.stat{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:0.85rem 0.5rem;text-align:center;}
.stat-n{font-size:1.6rem;font-weight:900;line-height:1;}
.stat-n.c-black{color:var(--black);}
.stat-n.c-green{color:var(--success);}
.stat-n.c-orange{color:var(--warning);}
.stat-n.c-red{color:var(--danger);}
.stat-l{font-size:0.7rem;color:var(--gray);margin-top:3px;line-height:1.3;}

/* SECTION */
.section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;overflow:hidden;}

/* ALERTS */
.section-head{padding:0.9rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.section-head h2{font-size:0.88rem;font-weight:700;display:flex;align-items:center;gap:0.4rem;}
.alert-item{display:flex;align-items:center;justify-content:space-between;padding:0.85rem 1rem;gap:0.75rem;border-bottom:1px solid var(--gray-lighter);}
.alert-item:last-child{border-bottom:none;}
.alert-name{font-size:0.9rem;font-weight:700;}
.alert-sub{font-size:0.78rem;color:var(--gray);margin-top:1px;}
.btn-wa{flex-shrink:0;height:34px;padding:0 0.85rem;background:#25d366;color:#fff;border:none;border-radius:20px;font-family:"Cairo",sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:0.3rem;}
.no-alerts{padding:1.2rem 1rem;font-size:0.85rem;color:var(--gray);text-align:center;}

/* SEARCH */
.members-head{padding:0.75rem 1rem;display:flex;align-items:center;gap:0.75rem;}
.search-box{flex:1;height:36px;background:var(--gray-lighter);border:none;border-radius:20px;padding:0 0.9rem;font-family:"Cairo",sans-serif;font-size:0.85rem;color:var(--black);outline:none;}
.search-box::placeholder{color:var(--gray);}
.search-count{font-size:0.75rem;color:var(--gray);white-space:nowrap;}

/* MEMBER CARD */
.mcard{border-bottom:1px solid var(--gray-lighter);padding:0.9rem 1rem;}
.mcard:last-child{border-bottom:none;}
.mcard-row1{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.5rem;}
.mcard-name{font-size:0.95rem;font-weight:700;}
.mcard-code{font-size:0.72rem;color:var(--gray);direction:ltr;margin-top:2px;font-weight:600;letter-spacing:0.5px;}
.badge{display:inline-flex;align-items:center;height:22px;padding:0 0.6rem;border-radius:11px;font-size:0.72rem;font-weight:700;white-space:nowrap;}
.badge-green{background:#dcfce7;color:var(--success);}
.badge-orange{background:#fef3c7;color:var(--warning);}
.badge-red{background:#fee2e2;color:var(--danger);}
.mcard-meta{display:flex;gap:1rem;font-size:0.8rem;color:var(--gray);margin-bottom:0.65rem;flex-wrap:wrap;}
.mcard-meta b{color:var(--black);font-weight:600;}
.mcard-actions{display:flex;gap:0.45rem;flex-wrap:wrap;}
.btn-a{height:32px;padding:0 0.85rem;border-radius:16px;border:1px solid var(--border);background:var(--white);font-family:"Cairo",sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;color:var(--black);transition:background 0.12s;white-space:nowrap;}
.btn-a:hover{background:var(--gray-lighter);}
.btn-a.renew{background:var(--black);color:var(--white);border-color:var(--black);}
.btn-a.renew:hover{opacity:0.82;}
.btn-a.danger{color:var(--danger);border-color:#fecaca;}
.btn-a.danger:hover{background:#fee2e2;}
.btn-a.blue{color:#2563eb;border-color:#bfdbfe;}
.btn-a.blue:hover{background:#eff6ff;}

/* EMPTY */
.empty{padding:3rem 1rem;text-align:center;color:var(--gray);}
.empty-icon{font-size:2.5rem;margin-bottom:0.75rem;}

/* OVERLAY / MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;animation:fIn 0.15s ease;}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:1.5rem 1.25rem 2.5rem;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;animation:sUp 0.25s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes sUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:36px;height:4px;background:var(--gray-light);border-radius:2px;margin:0 auto 1.25rem;}
.modal-title{font-size:1rem;font-weight:900;margin-bottom:1.25rem;}
.fg{margin-bottom:0.9rem;}
.fg label{font-size:0.78rem;font-weight:600;color:var(--gray);margin-bottom:0.35rem;display:block;}
.fg input,.fg select{width:100%;background:var(--gray-lighter);border:1.5px solid transparent;border-radius:var(--radius-sm);padding:0.75rem 0.9rem;font-family:"Cairo",sans-serif;font-size:0.9rem;color:var(--black);outline:none;transition:border-color 0.15s,background 0.15s;}
.fg input:focus,.fg select:focus{background:var(--white);border-color:var(--black);}
.fg select option{background:var(--white);}
.code-pill{background:var(--black);color:var(--white);border-radius:var(--radius-sm);padding:0.75rem 0.9rem;font-size:1rem;font-weight:900;letter-spacing:3px;text-align:center;margin-top:0.3rem;}
.hint{border-radius:var(--radius-sm);padding:0.65rem 0.9rem;font-size:0.8rem;line-height:1.6;margin-bottom:0.75rem;display:none;}
.hint-dark{background:var(--black);color:var(--white);}
.hint-green{background:#dcfce7;color:var(--success);}
.current-info{background:var(--gray-lighter);border-radius:var(--radius-sm);padding:0.75rem 0.9rem;margin-bottom:1rem;font-size:0.83rem;}
.ci-label{color:var(--gray);font-size:0.75rem;margin-bottom:0.25rem;}
.ci-val{font-weight:700;}
.modal-footer{display:flex;gap:0.6rem;margin-top:1.25rem;}
.btn-cancel{flex:1;height:48px;background:var(--gray-lighter);color:var(--black);border:none;border-radius:24px;font-family:"Cairo",sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;}
.btn-confirm{flex:2;height:48px;background:var(--black);color:var(--white);border:none;border-radius:24px;font-family:"Cairo",sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:opacity 0.15s;}
.btn-confirm:hover{opacity:0.82;}
.btn-confirm.green{background:var(--success);}

@media(min-width:580px){
  .overlay{align-items:center;padding:1rem;}
  .modal{border-radius:20px;max-height:85vh;}
  @keyframes sUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
}
</style>
</head>

<script>
const SB_URL="https://ublurrzfsxikexfhqbns.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVibHVycnpmc3hpa2V4ZmhxYm5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NDEyODEsImV4cCI6MjA5MzExNzI4MX0.SPlW6T2iBg8tTkFbp1FXDKHaoZrkDlnUAxlUPNhIiFQ";

async function sb(path,method="GET",body=null){
  const r=await fetch(SB_URL+"/rest/v1/"+path,{method,headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=representation"},body:body?JSON.stringify(body):null});
  const t=await r.text();return t?JSON.parse(t):[];
}

const dl=end=>{const e=new Date(end),n=new Date();e.setHours(0,0,0,0);n.setHours(0,0,0,0);return Math.ceil((e-n)/86400000);};
const fmt=d=>new Date(d).toLocaleDateString("ar-EG");
const genCode=()=>"TEFA-"+Math.random().toString(36).substring(2,6).toUpperCase();
const getDays=p=>p.duration_days||p.duration_months*30||0;
const badge=d=>{
  if(d<0) return"<span class=\"badge badge-red\">منتهي</span>";
  if(d<=3) return`<span class="badge badge-orange">${d} يوم</span>`;
  if(d<=7) return`<span class="badge badge-orange">${d} يوم</span>`;
  return`<span class="badge badge-green">${d} يوم</span>`;
};

let pkgs=[],members=[],alerts=[];

async function loadData(){
  [pkgs,members]=await Promise.all([sb("gym_packages?select=*&order=price.asc"),sb("gym_members?select=*,gym_packages(*)&order=end_date.asc")]);
  render();
}

function render(){
  let active=0,expiring=0,expired=0;
  members.forEach(m=>{const d=dl(m.end_date);if(d<0)expired++;else if(d<=7)expiring++;else active++;});
  document.getElementById("sTotal").textContent=members.length;
  document.getElementById("sActive").textContent=active;
  document.getElementById("sExpiring").textContent=expiring;
  document.getElementById("sExpired").textContent=expired;

  alerts=members.filter(m=>{const d=dl(m.end_date);return d>=0&&d<=3;});
  const as=document.getElementById("alertsSection");
  if(!alerts.length){as.style.display="none";}
  else{
    as.style.display="block";
    document.getElementById("alertsList").innerHTML=alerts.map((m,i)=>`
      <div class="alert-item">
        <div><div class="alert-name">${m.name}</div><div class="alert-sub">📱 ${m.phone} — ${dl(m.end_date)===0?"ينتهي اليوم":"باقي "+dl(m.end_date)+" يوم"}</div></div>
        <button class="btn-wa" onclick="sendReminder(${i})">📲 تذكير</button>
      </div>`).join("");
  }
  renderList(members);
}

function renderList(list){
  const el=document.getElementById("membersList");
  if(!list.length){el.innerHTML="<div class=\"empty\"><div class=\"empty-icon\">🏋️</div><div>لا يوجد أعضاء بعد</div></div>";return;}
  el.innerHTML=list.map(m=>{
    const i=members.indexOf(m);const d=dl(m.end_date);
    return`<div class="mcard" data-idx="${i}">
      <div class="mcard-row1"><div><div class="mcard-name">${m.name}</div><div class="mcard-code">${m.code}</div></div>${badge(d)}</div>
      <div class="mcard-meta"><span><b>${m.gym_packages?.name||"—"}</b></span><span>📱 ${m.phone}</span><span>حتى ${fmt(m.end_date)}</span></div>
      <div class="mcard-actions">
        <button class="btn-a" onclick="openEdit(${i})">تعديل</button>
        <button class="btn-a renew" onclick="openRenew(${i})">تجديد</button>
        ${m.fingerprint?`<button class="btn-a blue" onclick="resetDev('${m.id}')">فك الجهاز</button>`:""}
        <button class="btn-a danger" onclick="delMember('${m.id}','${m.name}')">حذف</button>
      </div>
    </div>`;
  }).join("");
}

function filterAll(){
  const q=document.getElementById("searchBar").value.trim().toLowerCase();
  const list=!q?members:members.filter(m=>m.name.toLowerCase().includes(q)||m.code.toLowerCase().includes(q)||m.phone.includes(q));
  renderList(list);
  document.getElementById("searchCount").textContent=q?list.length+" نتيجة":"";
}

// WA
function sendReminder(i){
  const m=alerts[i];const d=dl(m.end_date);
  const txt=encodeURIComponent("السلام عليكم "+m.name+" 👋
اشتراكك في TEFA GYM هينتهي "+(d===0?"اليوم":"خلال "+d+" يوم")+".
تواصل معانا لتجديد اشتراكك والاستمرار في رحلتك 💪");
  window.open("https://wa.me/"+m.phone.replace(/[^0-9]/g,"")+"?text="+txt,"_blank");
}
function sendWelcome(m){
  const txt=encodeURIComponent("أهلاً "+m.name+" 💪
يسعدنا انضمامك لـ TEFA GYM!

📋 تفاصيل اشتراكك:
• الباقة: "+(m.gym_packages?.name||"—")+"
• تاريخ البداية: "+fmt(m.start_date)+"
• تاريخ الانتهاء: "+fmt(m.end_date)+"
• الأيام المتبقية: "+dl(m.end_date)+" يوم
• كود المتابعة: "+m.code+"

نتمنالك تدريب موفق! 🏋️");
  window.open("https://wa.me/"+m.phone.replace(/[^0-9]/g,"")+"?text="+txt,"_blank");
}
function sendRenewal(m){
  const txt=encodeURIComponent("أهلاً "+m.name+" 💪
تم تجديد اشتراكك في TEFA GYM بنجاح!

📋 تفاصيل اشتراكك الجديد:
• الباقة: "+(m.gym_packages?.name||"—")+"
• تاريخ البداية: "+fmt(m.start_date)+"
• تاريخ الانتهاء: "+fmt(m.end_date)+"
• الأيام المتبقية: "+dl(m.end_date)+" يوم

استمر في رحلتك! 🏋️");
  window.open("https://wa.me/"+m.phone.replace(/[^0-9]/g,"")+"?text="+txt,"_blank");
}

// ADD
let newCode="";
function openAdd(){
  newCode=genCode();
  document.getElementById("aName").value="";document.getElementById("aPhone").value="";
  document.getElementById("aStart").value=new Date().toISOString().split("T")[0];
  document.getElementById("aEnd").value="";
  document.getElementById("aPackage").innerHTML="<option value=''>اختر الباقة</option>"+pkgs.map(p=>`<option value="${p.id}" data-days="${getDays(p)}">${p.name} — ${p.price} جنيه</option>`).join("");
  document.getElementById("aCode").textContent=newCode;
  document.getElementById("addModal").classList.add("open");
}
function calcAdd(){
  const sel=document.getElementById("aPackage");const d=parseInt(sel.options[sel.selectedIndex]?.dataset?.days||0);
  const start=document.getElementById("aStart").value;if(!d||!start)return;
  const dt=new Date(start);dt.setDate(dt.getDate()+d);document.getElementById("aEnd").value=dt.toISOString().split("T")[0];
}
async function saveAdd(){
  const name=document.getElementById("aName").value.trim();const phone=document.getElementById("aPhone").value.trim();
  const pkgId=document.getElementById("aPackage").value;const start=document.getElementById("aStart").value;const end=document.getElementById("aEnd").value;
  if(!name||!phone||!pkgId||!start||!end){alert("أكمل جميع البيانات");return;}
  try{
    const rows=await sb("gym_members","POST",{name,phone,package_id:pkgId,start_date:start,end_date:end,code:newCode,is_active:true,code_used_at:new Date().toISOString()});
    const nm={...rows[0],gym_packages:pkgs.find(p=>p.id===pkgId)};
    closeAll();await loadData();sendWelcome(nm);
  }catch(e){alert("خطأ: "+e.message);}
}

// EDIT
let editIdx=null;
function openEdit(i){
  editIdx=i;const m=members[i];
  document.getElementById("eId").value=m.id;document.getElementById("eName").value=m.name;document.getElementById("ePhone").value=m.phone;
  document.getElementById("ePackage").innerHTML="<option value=''>اختر الباقة</option>"+pkgs.map(p=>`<option value="${p.id}" data-days="${getDays(p)}" ${p.id===m.package_id?"selected":""}>${p.name} — ${p.price} جنيه</option>`).join("");
  document.getElementById("eStart").value=m.start_date;document.getElementById("eEnd").value=m.end_date;
  document.getElementById("eEnd").dataset.origEnd=m.end_date;document.getElementById("eCode").textContent=m.code;
  const d=dl(m.end_date);const h=document.getElementById("eHint");
  h.textContent=d>=0?"⚡ لو غيّرت الباقة، هتتجدد من "+fmt(m.end_date)+" — الأيام الباقية مش بتتضيع":"⚡ الاشتراك منتهي — التجديد هيبدأ من النهارده";
  h.style.display="block";document.getElementById("editModal").classList.add("open");
}
function calcEdit(){
  const sel=document.getElementById("ePackage");const d=parseInt(sel.options[sel.selectedIndex]?.dataset?.days||0);if(!d)return;
  const origEnd=document.getElementById("eEnd").dataset.origEnd;
  const base=origEnd&&dl(origEnd)>=0?new Date(origEnd):new Date();
  base.setHours(0,0,0,0);base.setDate(base.getDate()+d);document.getElementById("eEnd").value=base.toISOString().split("T")[0];
}
async function saveEdit(){
  const id=document.getElementById("eId").value;const name=document.getElementById("eName").value.trim();
  const phone=document.getElementById("ePhone").value.trim();const pkgId=document.getElementById("ePackage").value;
  const start=document.getElementById("eStart").value;const end=document.getElementById("eEnd").value;
  if(!name||!pkgId||!start||!end){alert("أكمل جميع البيانات");return;}
  await sb("gym_members?id=eq."+id,"PATCH",{name,phone,package_id:pkgId,start_date:start,end_date:end});
  closeAll();loadData();
}

// RENEW
let renewIdx=null;
function openRenew(i){
  renewIdx=i;const m=members[i];document.getElementById("rId").value=m.id;
  const d=dl(m.end_date);
  document.getElementById("rCurrentInfo").innerHTML=`${m.gym_packages?.name||"—"} &nbsp;·&nbsp; ينتهي ${fmt(m.end_date)} &nbsp;·&nbsp; <span style="color:${d<0?"var(--danger)":"var(--warning)"}">${d<0?"منتهي":"باقي "+d+" يوم"}</span>`;
  document.getElementById("rPackage").innerHTML="<option value=''>اختر الباقة</option>"+pkgs.map(p=>`<option value="${p.id}" data-days="${getDays(p)}" ${p.id===m.package_id?"selected":""}>${p.name} — ${p.price} جنيه</option>`).join("");
  document.getElementById("rEnd").value="";document.getElementById("rHint").style.display="none";
  calcRenew();document.getElementById("renewModal").classList.add("open");
}
function calcRenew(){
  const m=members[renewIdx];if(!m)return;
  const sel=document.getElementById("rPackage");const d=parseInt(sel.options[sel.selectedIndex]?.dataset?.days||0);if(!d)return;
  const base=dl(m.end_date)>=0?new Date(m.end_date):new Date();
  base.setHours(0,0,0,0);base.setDate(base.getDate()+d);document.getElementById("rEnd").value=base.toISOString().split("T")[0];
  const h=document.getElementById("rHint");
  h.textContent=dl(m.end_date)>=0?"✅ هيتجدد من "+fmt(m.end_date)+" — الأيام الباقية مش بتتضيع":"✅ الاشتراك منتهي — التجديد هيبدأ من النهارده";
  h.style.display="block";
}
async function saveRenew(){
  const m=members[renewIdx];const id=document.getElementById("rId").value;
  const pkgId=document.getElementById("rPackage").value;const end=document.getElementById("rEnd").value;
  if(!pkgId||!end){alert("اختر الباقة الأول");return;}
  const newStart=dl(m.end_date)<0?new Date().toISOString().split("T")[0]:m.start_date;
  await sb("gym_members?id=eq."+id,"PATCH",{package_id:pkgId,start_date:newStart,end_date:end,is_active:true,code_used_at:new Date().toISOString()});
  const updated={...m,start_date:newStart,end_date:end,gym_packages:pkgs.find(p=>p.id===pkgId)};
  closeAll();await loadData();sendRenewal(updated);
}

// MISC
function closeAll(){document.querySelectorAll(".overlay").forEach(o=>o.classList.remove("open"));}
async function resetDev(id){if(!confirm("هتفك ارتباط الجهاز؟"))return;await sb("gym_members?id=eq."+id,"PATCH",{fingerprint:null,code_used_at:null});loadData();}
async function delMember(id,name){if(!confirm("حذف \""+name+"\" نهائياً؟"))return;await sb("gym_members?id=eq."+id,"DELETE");loadData();}
document.querySelectorAll(".overlay").forEach(o=>o.addEventListener("click",e=>{if(e.target===o)closeAll();}));

loadData();
</script>
</body>
